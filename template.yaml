AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI-Assisted Contract Generation System

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Timeout: 60
    MemorySize: 512
    Layers:
      - !Ref SharedLayer
    Environment:
      Variables:
        CONTRACTS_TABLE: !Ref ContractsTable
        UPLOADS_BUCKET: !Ref UploadsBucket
        GENERATED_BUCKET: !Ref GeneratedBucket
        LLM_PROVIDER: !Ref LLMProvider
        LLM_MODEL_ID: !Ref LLMModelId
        ALLOWED_ORIGINS: !Ref AllowedOrigins
    Tags:
      Project: contract-gen
      Environment: !Ref Environment
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Amz-Date'"
      AllowOrigin: !Sub "'${AllowedOrigins}'"

Parameters:
  LLMProvider:
    Type: String
    Default: anthropic
    AllowedValues: [anthropic, openai, bedrock]
    Description: LLM provider to use for contract generation

  LLMModelId:
    Type: String
    Default: claude-sonnet-4-6
    Description: |
      Anthropic: claude-sonnet-4-6 | claude-opus-4-6
      OpenAI: gpt-4o | gpt-4o-mini
      Bedrock: anthropic.claude-3-5-sonnet-20241022-v2:0

  AnthropicApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Anthropic API key (required when LLMProvider=anthropic)

  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: OpenAI API key (required when LLMProvider=openai)

  AllowedOrigins:
    Type: String
    Default: "*"
    Description: Allowed CORS origins (e.g. https://your-cloudfront-domain.com)

  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]

Resources:
  # ─── API Gateway HTTP API ────────────────────────────────────────────────
  ContractApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigins
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 300

  # ─── Lambda Layer ────────────────────────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: contract-gen-shared
      Description: Shared code and dependencies for contract-gen
      ContentUri: backend/shared/
      CompatibleRuntimes: [python3.12]
      CompatibleArchitectures: [arm64]
    Metadata:
      BuildMethod: python3.12

  # ─── Lambda Functions ────────────────────────────────────────────────────
  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: contract-gen-upload
      CodeUri: backend/functions/upload/
      Handler: handler.lambda_handler
      Description: Upload contract documents to S3 and trigger Textract
      MemorySize: 256
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          OPENAI_API_KEY: !Ref OpenAIApiKey
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
        - Statement:
            - Effect: Allow
              Action:
                - textract:StartDocumentTextDetection
                - textract:GetDocumentTextDetection
              Resource: "*"
        - DynamoDBCrudPolicy:
            TableName: !Ref ContractsTable
      Events:
        Upload:
          Type: HttpApi
          Properties:
            ApiId: !Ref ContractApi
            Path: /contracts/upload
            Method: POST

  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: contract-gen-analyze
      CodeUri: backend/functions/analyze/
      Handler: handler.lambda_handler
      Description: Analyze usage patterns and store analysis
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ContractsTable
      Events:
        Analyze:
          Type: HttpApi
          Properties:
            ApiId: !Ref ContractApi
            Path: /contracts/analyze
            Method: POST

  GenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: contract-gen-generate
      CodeUri: backend/functions/generate/
      Handler: handler.lambda_handler
      Description: Generate contract using LLM pipeline
      MemorySize: 1024
      Timeout: 300
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          OPENAI_API_KEY: !Ref OpenAIApiKey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ContractsTable
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
        - S3CrudPolicy:
            BucketName: !Ref GeneratedBucket
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
      Events:
        Generate:
          Type: HttpApi
          Properties:
            ApiId: !Ref ContractApi
            Path: /contracts/generate
            Method: POST

  ListContractsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: contract-gen-list
      CodeUri: backend/functions/list_contracts/
      Handler: handler.lambda_handler
      Description: List all contracts
      MemorySize: 128
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ContractsTable
      Events:
        List:
          Type: HttpApi
          Properties:
            ApiId: !Ref ContractApi
            Path: /contracts
            Method: GET

  GetContractFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: contract-gen-get
      CodeUri: backend/functions/get_contract/
      Handler: handler.lambda_handler
      Description: Get a specific contract by ID
      MemorySize: 128
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ContractsTable
        - S3ReadPolicy:
            BucketName: !Ref GeneratedBucket
        - S3ReadPolicy:
            BucketName: !Ref UploadsBucket
      Events:
        Get:
          Type: HttpApi
          Properties:
            ApiId: !Ref ContractApi
            Path: /contracts/{contractId}
            Method: GET

  # ─── S3 Buckets ──────────────────────────────────────────────────────────
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "contract-gen-uploads-${AWS::AccountId}-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: [!Ref AllowedOrigins]
            MaxAge: 3000

  GeneratedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "contract-gen-generated-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "contract-gen-frontend-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ─── DynamoDB ────────────────────────────────────────────────────────────
  ContractsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: contract-gen-contracts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: contractId
          AttributeType: S
        - AttributeName: version
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: contractId
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: status-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ─── CloudFront ──────────────────────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: contract-gen-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendS3
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100

# ─── Outputs ───────────────────────────────────────────────────────────────
Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${ContractApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"

  CloudFrontUrl:
    Description: CloudFront distribution URL (frontend)
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontUrl"

  FrontendBucketName:
    Description: S3 bucket for frontend assets
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-FrontendBucket"

  UploadsBucketName:
    Description: S3 bucket for uploaded documents
    Value: !Ref UploadsBucket

  GeneratedBucketName:
    Description: S3 bucket for generated contracts
    Value: !Ref GeneratedBucket

  ContractsTableName:
    Description: DynamoDB table for contract metadata
    Value: !Ref ContractsTable
